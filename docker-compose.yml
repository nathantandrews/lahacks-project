version: '3.8'

services:
  # ── MongoDB Database ──────────────────────────────────────────────────────
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── FastAPI backend (MongoDB + AI routes) ──────────────────────────────────
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB_NAME=caregiver_hub
      - CAREGIVER_AGENT_URL=http://agent:8001
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - ./backend:/app

  # ── Fetch.ai CaregiverAgent (uAgents + ASI-1 Mini) ────────────────────────
  agent:
    build: ./caregiver-agent
    ports:
      - "8001:8001"
    env_file: ./caregiver-agent/.env
    environment:
      # Override BACKEND_URL so agent reaches backend via Docker network
      - BACKEND_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # ── ngrok tunnel (exposes agent port 8001 to Agentverse) ──────────────────
  ngrok:
    image: ngrok/ngrok:latest
    ports:
      - "4040:4040"   # ngrok web dashboard — visit http://localhost:4040
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    # If you have a static ngrok domain, set NGROK_DOMAIN in root .env
    # and it will be used automatically. Otherwise a random URL is assigned.
    command: >
      http
      ${NGROK_DOMAIN:+--domain=${NGROK_DOMAIN}}
      agent:8001
    depends_on:
      - agent
    restart: unless-stopped

  # ── Frontend (Vite) ───────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  mongodb_data:
